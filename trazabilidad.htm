<title>Trazabilidad MAFLES</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Segoe UI',sans-serif;background:#f4f6f3;min-height:100vh;padding:0 0 40px}
  .header{background:#1a4a2e;padding:16px 20px;display:flex;align-items:center;gap:12px}
  .header-logo{width:40px;height:40px;background:rgba(255,255,255,0.12);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
  .header-txt .sub{font-size:10px;color:rgba(255,255,255,0.55);letter-spacing:1.5px;text-transform:uppercase}
  .header-txt .title{font-size:18px;font-weight:700;color:#fff;margin-top:2px}
  .badge-vista{display:inline-block;font-size:10px;padding:2px 10px;border-radius:20px;margin-top:4px;font-weight:600}
  .badge-publica{background:rgba(125,214,154,0.2);color:#7dd69a;border:1px solid rgba(125,214,154,0.3)}
  .badge-privada{background:rgba(255,200,100,0.2);color:#ffc864;border:1px solid rgba(255,200,100,0.3)}
  .content{max-width:520px;margin:0 auto;padding:16px}
  .card{background:#fff;border-radius:12px;padding:16px;margin-bottom:14px;box-shadow:0 1px 4px rgba(0,0,0,0.07)}
  .section-title{font-size:11px;font-weight:700;color:#1a4a2e;letter-spacing:1px;text-transform:uppercase;margin-bottom:12px;padding-bottom:6px;border-bottom:1px solid #e8f5e9}
  .row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:0.5px solid #f0f0f0}
  .row:last-child{border:none}
  .lbl{font-size:13px;color:#888}
  .val{font-size:13px;font-weight:600;color:#222;text-align:right}
  .badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600}
  .badge-ok{background:#e8f5e9;color:#1a4a2e}
  .badge-warn{background:#fff8e1;color:#e65100}
  .badge-err{background:#fde8e8;color:#c0392b}
  .tbl-wrap{overflow-x:auto;margin-top:8px}
  table{width:100%;border-collapse:collapse;font-size:12px}
  th{background:#f0f8f0;color:#1a4a2e;padding:8px 8px;text-align:left;font-weight:600;border-bottom:1px solid #d0e8d0}
  td{padding:7px 8px;border-bottom:0.5px solid #f0f0f0;color:#333}
  .cumple-ok{color:#1a4a2e;font-weight:700}
  .cumple-no{color:#c0392b;font-weight:700}
  .error-box{background:#fde8e8;border:1px solid #f5c6c6;border-radius:8px;padding:16px;color:#c0392b;text-align:center;margin-top:20px}
  .loading{text-align:center;color:#888;padding:40px;font-size:14px}
  .footer{text-align:center;font-size:11px;color:#aaa;margin-top:8px}
  .btn-acceso{width:100%;padding:12px;background:#f8fcf8;border:1px solid #c0d8c0;border-radius:8px;color:#1a4a2e;font-size:13px;font-weight:600;cursor:pointer;margin-top:4px;display:flex;align-items:center;justify-content:center;gap:8px}
  .btn-acceso:hover{background:#e8f5e9}
  .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:100;align-items:center;justify-content:center}
  .modal-overlay.show{display:flex}
  .modal{background:#fff;border-radius:14px;padding:24px;width:90%;max-width:340px;box-shadow:0 8px 32px rgba(0,0,0,0.15)}
  .modal-title{font-size:16px;font-weight:700;color:#1a4a2e;margin-bottom:6px}
  .modal-sub{font-size:12px;color:#888;margin-bottom:16px}
  .modal input{width:100%;height:42px;padding:0 12px;border:1px solid #d0e8d0;border-radius:8px;font-size:14px;margin-bottom:12px}
  .modal-err{color:#c0392b;font-size:12px;margin-bottom:8px;display:none}
  .btn-ingresar{width:100%;height:42px;background:#1a4a2e;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer}
  .btn-cancelar{width:100%;height:36px;background:none;border:none;color:#888;font-size:13px;cursor:pointer;margin-top:6px}
  .vista-privada-banner{background:#fff8e1;border:1px solid #ffe082;border-radius:8px;padding:8px 12px;margin-bottom:14px;font-size:12px;color:#6d4c00;display:flex;align-items:center;gap:8px}
</style>

function fmtFecha(s){
  if(!s)return 'N/A';
  if(s.includes('-')){const[y,m,d]=s.split('-');return d+'-'+m+'-'+y;}
  return s;
}
function fmtNum(n){
  if(!n&&n!==0)return '0';
  return Number(n).toLocaleString('es-CL',{minimumFractionDigits:1,maximumFractionDigits:1});
}
function estadoVisual(evalObj){
  if(!evalObj)return{txt:'Sin evaluación',cls:'badge-warn'};
  const vals=Object.values(evalObj);
  const severo=vals.filter(v=>v==='Severo').length;
  const moderado=vals.filter(v=>v==='Moderado').length;
  if(severo>0)return{txt:'Rechazado',cls:'badge-err'};
  if(moderado>2)return{txt:'Observado',cls:'badge-warn'};
  return{txt:'Aceptado',cls:'badge-ok'};
}
function cumpleCarencia(cosecha, fechaRecepcion){
  if(!cosecha||cosecha===''||cosecha==='N/A')return{ok:true,txt:'\u2713 N/A'};
  const fRef = fechaRecepcion ? new Date(fechaRecepcion) : new Date();
  fRef.setHours(0,0,0,0);
  const fc=new Date(cosecha);fc.setHours(0,0,0,0);
  const ok=fRef>=fc;
  const dias=Math.ceil((fc-fRef)/(1000*60*60*24));
  return{ok,txt:ok?'✓ OK':'Faltan '+dias+'d'};
}

window.mostrarModalAcceso = function(){
  document.getElementById('modal-acceso').classList.add('show');
  setTimeout(()=>document.getElementById('input-clave').focus(),100);
}
window.cerrarModal = function(){
  document.getElementById('modal-acceso').classList.remove('show');
  document.getElementById('input-clave').value='';
  document.getElementById('modal-err').style.display='none';
}
window.verificarClave = function(){
  const clave=document.getElementById('input-clave').value;
  if(clave===CLAVE_PRIVADA){
    cerrarModal();
    document.getElementById('main-content').innerHTML=renderVistaPrivada(datosGlobales, agrosGlobales);
    document.getElementById('badge-vista').textContent='Vista privada';
    document.getElementById('badge-vista').className='badge-vista badge-privada';
    document.getElementById('btn-acceso-wrap').style.display='none';
  } else {
    document.getElementById('modal-err').style.display='block';
  }
}

async function cargarTrazabilidad(){
  const cont=document.getElementById('main-content');
  if(!recepId){
    cont.innerHTML='<div class="error-box">⚠️ ID de recepción no especificado</div>';
    return;
  }
  try{
    const app=initializeApp(firebaseConfig);
    const db=getFirestore(app);

    const recSnap=await getDoc(doc(db,'recepciones',recepId));
    let r;
    if(!recSnap.exists()){
      const recQ=query(collection(db,'recepciones'),where('id','==',recepId));
      const recSnap2=await getDocs(recQ);
      if(recSnap2.empty){
        cont.innerHTML='<div class="error-box">⚠️ Registro no encontrado (ID: '+recepId+')</div>';
        return;
      }
      r=recSnap2.docs[0].data();
    } else {
      r=recSnap.data();
    }

    const campoQ=query(collection(db,'campo'),
      where('proveedor','==',r.proveedor),
      where('especie','==',r.especie));
    const campoSnap=await getDocs(campoQ);
    const agros=campoSnap.docs.map(d=>d.data());

    const todosQ=query(collection(db,'recepciones'),orderBy('_ts','asc'));
    const todosSnap=await getDocs(todosQ);
    const idx=todosSnap.docs.findIndex(d=>d.data().id===recepId);
    const nCorr=String(idx>=0?idx+1:1).padStart(4,'0');
    document.getElementById('hdr-title').textContent='TRZ-'+nCorr+' — '+r.especie;

    datosGlobales=r;
    agrosGlobales=agros;

    cont.innerHTML=renderVistaPublica(r, agros);
    document.getElementById('btn-acceso-wrap').style.display='block';

  }catch(err){
    cont.innerHTML='<div class="error-box">⚠️ Error cargando datos:<br>'+err.message+'</div>';
    console.error(err);
  }
}

cargarTrazabilidad();
</script>
